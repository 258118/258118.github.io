    <h1>my script</h1>
    <p>import matplotlib.pyplot as plt
import numpy as np

x = np.linspace(0, 10, 100)
y1 = np.sin(x)
y2 = np.cos(x)

plt.plot(x, y1, 'r-', label='sin')
plt.plot(x, y2, 'b--', label='cos')
plt.legend()
plt.xlabel('时间 (s)')
plt.ylabel('幅度')
plt.title('正弦波与余弦波')
plt.grid(True)
plt.show()</p>
